name: Steam Daily Deal Bot

on:
  schedule:
    - cron: '0 1 * * *' # Chạy lúc 8:00 AM giờ VN mỗi ngày
  workflow_dispatch:      # Nút bấm chạy tay để test trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          # Kết nối Secret trên Web với Code Python
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py